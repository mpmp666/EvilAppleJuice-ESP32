name: Compile EvilAppleJuice for ESP32-S3

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install arduino-cli (curl install -> put binary in $HOME/.local/bin)
        run: |
          mkdir -p $HOME/.local/bin
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | BINDIR=$HOME/.local/bin sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify arduino-cli is on PATH
        run: |
          echo "PATH=$PATH"
          ls -la $HOME/.local/bin || true
          which arduino-cli || true
          arduino-cli version

      - name: Configure arduino-cli (add ESP32 board index)
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

      - name: Install ESP32 core
        run: |
          arduino-cli core update-index
          arduino-cli core install esp32:esp32
          
      - name: Compile for ESP32-S3
        run: |
          BUILD_DIR=build
          mkdir -p "$BUILD_DIR"
          arduino-cli compile --fqbn esp32:esp32:esp32s3 --build-path "$BUILD_DIR" ./src/EvilAppleJuice-ESP32-INO
          echo "Build artifacts:"
          find "$BUILD_DIR" -maxdepth 4 -type f -print || true

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: evil-apple-juice-firmware
          path: build
